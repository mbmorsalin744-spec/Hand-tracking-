<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hand Connect - Neon Tracking</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
#wrap { position: relative; width: 100vw; height: 100vh; }
#cam {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover; transform: scaleX(-1); opacity: 0.85; z-index: 1;
}
#cv {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    transform: scaleX(-1); z-index: 2;
}
#hud {
    position: absolute; top: 15px; left: 15px; z-index: 100;
    background: rgba(0, 15, 15, 0.75);
    border: 1px solid rgba(0, 255, 200, 0.4);
    border-radius: 10px;
    padding: 15px;
    color: #0ff;
    font-size: 13px;
    min-width: 170px;
    backdrop-filter: blur(5px);
    font-family: 'Courier New', Courier, monospace;
}
#hud .row { display: flex; justify-content: space-between; margin: 5px 0; }
#hud .lab { color: rgba(0, 255, 200, 0.6); }
#hud .val { color: #0ff; font-weight: bold; }
#hud .val.pinch { color: #ff0; text-shadow: 0 0 10px #ff0; }
#start {
    position: absolute; inset: 0; z-index: 1000; background: #000;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    gap: 20px;
}
#start h1 { color: #0ff; font-size: 32px; text-shadow: 0 0 20px #0ff; }
#start p { color: #888; font-size: 14px; max-width: 350px; text-align: center; line-height: 1.5; }
#btn {
    padding: 18px 50px; font-size: 20px; border: none; border-radius: 40px;
    background: linear-gradient(90deg, #00d2ff, #3a7bd5); color: #fff;
    font-weight: bold; cursor: pointer; box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
}
#btn:active { transform: scale(0.96); }
#load {
    position: absolute; inset: 0; z-index: 999; background: rgba(0,0,0,0.92);
    display: none; flex-direction: column; justify-content: center; align-items: center;
    gap: 15px; color: #0ff; font-size: 18px;
}
.spin { width: 50px; height: 50px; border: 4px solid #333; border-top-color: #0ff; border-radius: 50%; animation: sp 1s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }
#err {
    position: absolute; inset: 0; z-index: 998; background: rgba(20,0,0,0.95);
    display: none; flex-direction: column; justify-content: center; align-items: center;
    padding: 30px; text-align: center; color: #faa;
}
#err h2 { color: #f44; margin-bottom: 10px; }
#err p { color: #aaa; font-size: 14px; line-height: 1.6; max-width: 350px; }
#badge {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    z-index: 100; padding: 12px 30px; background: rgba(0, 255, 200, 0.15);
    border: 2px solid #0ff; border-radius: 30px; color: #0ff;
    font-size: 18px; font-weight: bold; display: none;
    backdrop-filter: blur(5px); text-shadow: 0 0 10px #0ff;
}
</style>
<base target="_blank">
</head>
<body>

<div id="wrap">
    <video id="cam" playsinline autoplay muted></video>
    <canvas id="cv"></canvas>

    <div id="hud">
        <div class="row"><span class="lab">Hands Detected:</span><span class="val" id="vHands">0</span></div>
        <div class="row"><span class="lab">FPS:</span><span class="val" id="vFps">0</span></div>
        <div class="row"><span class="lab">Gesture:</span><span class="val" id="vGest">-</span></div>
        <div class="row"><span class="lab">Spread:</span><span class="val" id="vSpread">0%</span></div>
    </div>

    <div id="badge">👌 PINCH!</div>

    <div id="start">
        <h1>🖐 Hand Connect</h1>
        <p>Neon hand tracking with real-time gesture detection. Works directly in your browser.</p>
        <button id="btn" onclick="go()">▶ START CAMERA</button>
        <p style="font-size:12px;color:#555;">Use Chrome or Safari • Allow Camera • HTTPS Required</p>
    </div>

    <div id="load">
        <div class="spin"></div>
        <div>Loading AI Model...</div>
        <div style="font-size:12px;color:#666;">First time: ~10 seconds</div>
    </div>

    <div id="err">
        <h2>❌ ERROR</h2>
        <p id="errMsg">Something went wrong</p>
    </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const video = document.getElementById('cam');
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
const startDiv = document.getElementById('start');
const loadDiv = document.getElementById('load');
const errDiv = document.getElementById('err');
const errMsg = document.getElementById('errMsg');

const vHands = document.getElementById('vHands');
const vFps = document.getElementById('vFps');
const vGest = document.getElementById('vGest');
const vSpread = document.getElementById('vSpread');
const badge = document.getElementById('badge');

let hands, camera;
let fc = 0, lt = 0, fps = 0;

// Resize canvas exactly to window
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Distance between two landmarks
function dist(a, b) {
    return Math.sqrt(Math.pow(a.x - b.x, 2) + Math.pow(a.y - b.y, 2));
}

// Hand connections (same as MediaPipe)
const CONNS = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [0,9],[9,10],[10,11],[11,12],
    [0,13],[13,14],[14,15],[15,16],
    [0,17],[17,18],[18,19],[19,20],
    [5,9],[9,13],[13,17]
];

// Neon colors per hand
const COLORS = [
    {r:0, g:255, b:255},   // Cyan
    {r:255, g:0, b:255}    // Magenta
];

// Draw a glowing neon line (fast method without shadowBlur lag)
function neonLine(x1, y1, x2, y2, c, width) {
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Outer soft glow
    ctx.strokeStyle = `rgba(${c.r},${c.g},${c.b},0.15)`;
    ctx.lineWidth = width + 12;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

    // Mid glow
    ctx.strokeStyle = `rgba(${c.r},${c.g},${c.b},0.4)`;
    ctx.lineWidth = width + 5;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

    // Core line
    ctx.strokeStyle = `rgba(${c.r},${c.g},${c.b},0.95)`;
    ctx.lineWidth = width;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

    // White center
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = width * 0.35;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}

// Draw glowing joint
function neonJoint(x, y, c, size) {
    // Outer aura
    ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},0.25)`;
    ctx.beginPath(); ctx.arc(x, y, size + 8, 0, Math.PI*2); ctx.fill();

    // Mid
    ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},0.6)`;
    ctx.beginPath(); ctx.arc(x, y, size + 3, 0, Math.PI*2); ctx.fill();

    // Core white
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.fill();
}

// Draw one hand skeleton
function drawHand(lm, idx) {
    const c = COLORS[idx % 2];
    const w = canvas.width;
    const h = canvas.height;

    // Draw connections
    for (let [a, b] of CONNS) {
        const x1 = lm[a].x * w;
        const y1 = lm[a].y * h;
        const x2 = lm[b].x * w;
        const y2 = lm[b].y * h;
        neonLine(x1, y1, x2, y2, c, 3);
    }

    // Draw joints
    for (let i = 0; i < lm.length; i++) {
        const x = lm[i].x * w;
        const y = lm[i].y * h;
        const s = (i % 4 === 0) ? 5 : 2.5; // tips bigger
        neonJoint(x, y, c, s);
    }
}

// Draw rainbow bridge between two hands
function drawBridge(handsData) {
    if (handsData.length < 2) return;
    const w = canvas.width;
    const h = canvas.height;

    const c1 = handsData[0][9]; // middle finger base
    const c2 = handsData[1][9];
    const x1 = c1.x * w, y1 = c1.y * h;
    const x2 = c2.x * w, y2 = c2.y * h;

    const grad = ctx.createLinearGradient(x1, y1, x2, y2);
    grad.addColorStop(0, 'rgba(0,255,255,0.8)');
    grad.addColorStop(0.5, 'rgba(255,0,255,0.8)');
    grad.addColorStop(1, 'rgba(255,255,0,0.8)');

    ctx.lineCap = 'round';
    ctx.strokeStyle = grad;
    ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

    // Center glow orb
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.arc(mx, my, 6, 0, Math.PI*2); ctx.fill();
}

// Calculate hand spread percentage
function getSpread(lm) {
    const wrist = lm[0];
    const tips = [lm[4], lm[8], lm[12], lm[16], lm[20]];
    let max = 0;
    for (let t of tips) {
        const d = dist(wrist, t);
        if (d > max) max = d;
    }
    return Math.min(Math.round(max * 150), 100);
}

// Check pinch gesture
function isPinch(lm) {
    return dist(lm[4], lm[8]) < 0.055;
}

// MediaPipe results handler
function onResults(results) {
    const now = performance.now();
    fc++;
    if (now - lt >= 1000) {
        fps = fc;
        fc = 0;
        lt = now;
        vFps.textContent = fps;
    }

    // Clear canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        vHands.textContent = '0';
        vGest.textContent = '-';
        vSpread.textContent = '0%';
        vGest.className = 'val';
        badge.style.display = 'none';
        return;
    }

    const handsData = results.multiHandLandmarks;
    let hasPinch = false;
    let totalSpread = 0;

    // Draw each hand
    for (let i = 0; i < handsData.length; i++) {
        drawHand(handsData[i], i);
        if (isPinch(handsData[i])) hasPinch = true;
        totalSpread += getSpread(handsData[i]);
    }

    // Draw bridge between hands
    drawBridge(handsData);

    // Update HUD
    vHands.textContent = handsData.length;
    const avgSpread = Math.round(totalSpread / handsData.length);
    vSpread.textContent = avgSpread + '%';

    if (hasPinch) {
        vGest.textContent = 'PINCH!';
        vGest.className = 'val pinch';
        badge.style.display = 'block';
    } else {
        vGest.textContent = 'OPEN';
        vGest.className = 'val';
        badge.style.display = 'none';
    }
}

// Start everything
async function go() {
    startDiv.style.display = 'none';
    loadDiv.style.display = 'flex';

    try {
        // Check libraries loaded
        if (typeof Hands === 'undefined') {
            throw new Error('MediaPipe Hands library failed to load. Check your internet connection and refresh.');
        }
        if (typeof Camera === 'undefined') {
            throw new Error('MediaPipe Camera utility failed to load. Check your internet connection and refresh.');
        }

        // Init Hands
        hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        // Init Camera
        camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 640,
            height: 480
        });

        await camera.start();
        loadDiv.style.display = 'none';

    } catch (e) {
        loadDiv.style.display = 'none';
        errDiv.style.display = 'flex';
        errMsg.innerHTML = `<b>${e.message}</b><br><br>
        <b>Fixes:</b><br>
        • Use <b>Chrome</b> or <b>Safari</b> browser<br>
        • Connect to <b>HTTPS</b> (not HTTP)<br>
        • Allow <b>Camera Permission</b> when prompted<br>
        • Check your <b>internet</b> (needs to download 3MB model)<br>
        • Refresh the page and try again`;
        console.error(e);
    }
}

// Check on load
window.addEventListener('load', () => {
    console.log('Page loaded. MediaPipe Hands:', typeof Hands, 'Camera:', typeof Camera);
});
</script>

</body>
</html>
