<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real Hand Neon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.85; /* আসল ভিডিও স্পষ্ট দেখা যাবে */
            z-index: 1;
        }
        
        #canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: scaleX(-1);
            z-index: 2;
            /* গ্লো এফেক্টের জন্য */
            filter: contrast(1.1);
        }
        
        /* HUD - ছবির মতো */
        #hud {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 100;
            background: rgba(0, 10, 20, 0.6);
            border: 1px solid rgba(0, 255, 200, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: #0ff;
            font-size: 13px;
            backdrop-filter: blur(4px);
            min-width: 160px;
        }
        
        #hud .row {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
            font-family: monospace;
        }
        
        #hud .label { color: rgba(0,255,200,0.6); }
        #hud .val { color: #0ff; font-weight: bold; }
        #hud .val.pinch { color: #ff0; text-shadow: 0 0 10px #ff0; }
        
        /* Start Screen */
        #startScreen {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        
        #startScreen h1 {
            color: #0ff;
            font-size: 28px;
            text-shadow: 0 0 20px #0ff;
        }
        
        #startScreen p {
            color: #888;
            font-size: 14px;
            text-align: center;
            max-width: 300px;
            line-height: 1.5;
        }
        
        .btn {
            padding: 16px 40px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0,210,255,0.3);
        }
        
        .btn:active { transform: scale(0.96); }
        
        #loading {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #0ff;
            gap: 15px;
        }
        
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid #333;
            border-top-color: #0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #error {
            position: absolute;
            inset: 0;
            background: rgba(30,0,0,0.95);
            z-index: 998;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #faa;
            padding: 30px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="container">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    
    <div id="hud">
        <div class="row"><span class="label">Hands:</span><span class="val" id="hHands">0</span></div>
        <div class="row"><span class="label">FPS:</span><span class="val" id="hFps">0</span></div>
        <div class="row"><span class="label">Gesture:</span><span class="val" id="hGest">-</span></div>
        <div class="row"><span class="label">Spread:</span><span class="val" id="hSpread">0%</span></div>
    </div>
    
    <div id="startScreen">
        <h1>🖐️ Neon Hand</h1>
        <p>Real-time hand tracking with neon glow effects. Optimized for mobile.</p>
        <button class="btn" onclick="start()">▶ START</button>
        <p style="font-size:12px;color:#444;">Chrome/Safari • Needs Camera</p>
    </div>
    
    <div id="loading">
        <div class="spinner"></div>
        <div>Loading AI Model...</div>
        <div style="font-size:12px;color:#666;">First time may take 10-15 sec</div>
    </div>
    
    <div id="error">
        <h2>❌ Error</h2>
        <p id="errMsg">Something went wrong</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: true });
const startScreen = document.getElementById('startScreen');
const loading = document.getElementById('loading');
const error = document.getElementById('error');
const errMsg = document.getElementById('errMsg');

const hHands = document.getElementById('hHands');
const hFps = document.getElementById('hFps');
const hGest = document.getElementById('hGest');
const hSpread = document.getElementById('hSpread');

let hands, camera;
let frameCount = 0, lastTime = 0, fps = 0;

// Trail system for smooth fading lines
const trails = [[], []]; // max 2 hands

// Colors: Cyan, Magenta
const COLORS = [
    { r: 0, g: 255, b: 255 },
    { r: 255, g: 0, b: 255 }
];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function dist(a, b) {
    return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
}

function getSpread(lm) {
    const wrist = lm[0];
    const tips = [lm[4], lm[8], lm[12], lm[16], lm[20]];
    let max = 0;
    for (let t of tips) {
        const d = dist(wrist, t);
        if (d > max) max = d;
    }
    return Math.min(Math.round(max * 140), 100);
}

function isPinching(lm) {
    return dist(lm[4], lm[8]) < 0.055;
}

// ========== FAST GLOW DRAWING (no shadowBlur) ==========
function drawGlowLine(x1, y1, x2, y2, color, width = 3) {
    // Use lighter composite for fast bloom effect instead of slow shadowBlur
    ctx.globalCompositeOperation = 'screen';
    
    // Outer soft glow
    ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},0.3)`;
    ctx.lineWidth = width + 12;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    
    // Medium glow
    ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},0.6)`;
    ctx.lineWidth = width + 4;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    
    // Core bright line
    ctx.strokeStyle = `rgba(255,255,255,0.9)`;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    
    ctx.globalCompositeOperation = 'source-over';
}

function drawFingertipGlow(x, y, color) {
    ctx.globalCompositeOperation = 'screen';
    
    // Large soft aura
    const grad = ctx.createRadialGradient(x, y, 0, x, y, 40);
    grad.addColorStop(0, `rgba(${color.r},${color.g},${color.b},0.4)`);
    grad.addColorStop(1, `rgba(${color.r},${color.g},${color.b},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, 40, 0, Math.PI*2);
    ctx.fill();
    
    // Bright core
    ctx.fillStyle = `rgba(255,255,255,0.9)`;
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI*2);
    ctx.fill();
    
    ctx.globalCompositeOperation = 'source-over';
}

// Draw smooth hand outline (not skeleton) - looks more realistic
function drawHandOutline(landmarks, colorIdx) {
    const c = COLORS[colorIdx % 2];
    const w = canvas.width;
    const h = canvas.height;
    
    // Only outer contour points for realistic look: wrist, knuckles, fingertips
    const outlineIndices = [0, 1, 2, 3, 4, 8, 12, 16, 20, 17, 0];
    
    ctx.globalCompositeOperation = 'screen';
    
    // Draw thick outer glow
    ctx.strokeStyle = `rgba(${c.r},${c.g},${c.b},0.25)`;
    ctx.lineWidth = 20;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (let i = 0; i < outlineIndices.length; i++) {
        const idx = outlineIndices[i];
        const x = landmarks[idx].x * w;
        const y = landmarks[idx].y * h;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    
    // Medium glow
    ctx.strokeStyle = `rgba(${c.r},${c.g},${c.b},0.5)`;
    ctx.lineWidth = 8;
    ctx.stroke();
    
    // Sharp inner line
    ctx.strokeStyle = `rgba(255,255,255,0.7)`;
    ctx.lineWidth = 2;
    ctx.stroke();
    
    ctx.globalCompositeOperation = 'source-over';
    
    // Fingertip glows only (not all joints)
    const tips = [4, 8, 12, 16, 20];
    for (let ti of tips) {
        drawFingertipGlow(landmarks[ti].x * w, landmarks[ti].y * h, c);
    }
}

// Rainbow energy beam between hands
function drawEnergyBeam(handsData) {
    if (handsData.length < 2) return;
    
    const w = canvas.width;
    const h = canvas.height;
    
    // Get palm centers
    const c1 = handsData[0].landmarks[9]; // middle finger base
    const c2 = handsData[1].landmarks[9];
    const x1 = c1.x * w, y1 = c1.y * h;
    const x2 = c2.x * w, y2 = c2.y * h;
    
    ctx.globalCompositeOperation = 'screen';
    
    // Animated beam
    const time = Date.now() / 200;
    
    // Thick outer rainbow
    const grad = ctx.createLinearGradient(x1, y1, x2, y2);
    grad.addColorStop(0, 'rgba(0,255,255,0.5)');
    grad.addColorStop(0.5, 'rgba(255,0,255,0.5)');
    grad.addColorStop(1, 'rgba(255,255,0,0.5)');
    
    ctx.strokeStyle = grad;
    ctx.lineWidth = 15 + Math.sin(time) * 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    
    // Inner white core
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    
    // Pulsing center orb
    const mx = (x1+x2)/2, my = (y1+y2)/2;
    const pulse = 8 + Math.sin(time*2) * 4;
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(mx, my, pulse, 0, Math.PI*2);
    ctx.fill();
    
    ctx.globalCompositeOperation = 'source-over';
}

// ========== MAIN LOOP ==========
function onResults(results) {
    const now = performance.now();
    frameCount++;
    if (now - lastTime >= 1000) {
        fps = frameCount;
        frameCount = 0;
        lastTime = now;
        hFps.textContent = fps;
    }
    
    // Clear with slight fade for trail effect? No, clear fully for crisp video
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        hHands.textContent = '0';
        hGest.textContent = '-';
        hSpread.textContent = '0%';
        hGest.className = 'val';
        return;
    }
    
    const handsData = [];
    let hasPinch = false;
    let totalSpread = 0;
    
    for (let i = 0; i < results.multiHandLandmarks.length; i++) {
        const lm = results.multiHandLandmarks[i];
        drawHandOutline(lm, i);
        handsData.push({ landmarks: lm });
        
        if (isPinching(lm)) hasPinch = true;
        totalSpread += getSpread(lm);
    }
    
    drawEnergyBeam(handsData);
    
    // Update HUD
    hHands.textContent = results.multiHandLandmarks.length;
    const avgSpread = Math.round(totalSpread / results.multiHandLandmarks.length);
    hSpread.textContent = avgSpread + '%';
    
    if (hasPinch) {
        hGest.textContent = 'PINCH!';
        hGest.className = 'val pinch';
    } else {
        hGest.textContent = 'OPEN';
        hGest.className = 'val';
    }
}

// ========== START ==========
async function start() {
    startScreen.style.display = 'none';
    loading.style.display = 'flex';
    
    try {
        if (typeof Hands === 'undefined') {
            throw new Error('Library not loaded. Check internet.');
        }
        
        hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });
        
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 0, // ⚡ LIGHTWEIGHT for mobile
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        
        hands.onResults(onResults);
        
        // Lower resolution for smooth mobile performance
        camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 640,
            height: 480
        });
        
        await camera.start();
        loading.style.display = 'none';
        
    } catch (e) {
        loading.style.display = 'none';
        error.style.display = 'flex';
        errMsg.innerHTML = `<b>${e.message}</b><br><br>Tips:<br>• Use Chrome/Safari<br>• Allow camera<br>• Use HTTPS`;
        console.error(e);
    }
}

// Check library loaded
window.addEventListener('load', () => {
    if (typeof Hands === 'undefined') {
        console.warn('MediaPipe loading...');
    }
});
</script>

</body>
</html>
